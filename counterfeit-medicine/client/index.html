<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MedVerify</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo"><span class="logo-icon">💊</span> MedVerify</div>
  </header>
  <main>
    <div class="auth-wrapper">
      <div class="auth-header">
        <div class="badge">🔐 Secure Access</div>
        <h2>Welcome Back</h2>
        <p>Sign in to verify medicines and check scan history</p>
      </div>
      <div class="glass-card">
        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrap">
              <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
              <span class="input-icon">✉️</span>
            </div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
              <span class="input-icon">🔒</span>
            </div>
          </div>
          <span id="error-msg" class="error-msg"></span>
          <button type="submit" class="btn btn-primary" id="login-btn">
            <span class="btn-text">Sign In →</span>
          </button>
        </form>
      </div>
      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
