<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — MedVerify</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo"><span class="logo-icon">💊</span> MedVerify</div>
    <div class="nav-links" id="nav-links"></div>
  </header>
  <main>
    <div class="page-wrapper" id="dashboard-container">
      <div class="page-header">
        <div>
          <div class="page-title">My <span>Dashboard</span></div>
          <p style="color:var(--text-muted);font-size:0.85rem;margin-top:0.25rem;">Your personal scan history & activity</p>
        </div>
        <a href="scanner.html" class="btn btn-primary" style="width:auto;text-decoration:none;padding:0.7rem 1.25rem;font-size:0.875rem;">
          📷 Scan Medicine
        </a>
      </div>

      <div class="stats-grid" id="user-stats">
        <div class="stat-card primary">
          <div class="stat-icon">📊</div>
          <div class="stat-number" id="user-total">—</div>
          <div class="stat-label">Total Scans</div>
        </div>
        <div class="stat-card success">
          <div class="stat-icon">✅</div>
          <div class="stat-number" id="user-genuine">—</div>
          <div class="stat-label">Genuine</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-icon">🚨</div>
          <div class="stat-number" id="user-fake">—</div>
          <div class="stat-label">Fake Detected</div>
        </div>
      </div>

      <div class="table-wrapper">
        <div class="table-header">
          <span class="table-title">Scan History</span>
          <span style="font-size:0.8rem;color:var(--text-muted)" id="scan-count"></span>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Date & Time</th>
                <th>QR ID</th>
                <th>Result</th>
                <th>Blockchain Hash</th>
              </tr>
            </thead>
            <tbody id="logs-body">
              <tr><td colspan="4"><div class="empty-state"><div class="empty-icon">⏳</div><p>Loading scan history...</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
