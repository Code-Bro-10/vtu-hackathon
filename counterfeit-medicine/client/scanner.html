<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan QR — MedVerify</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .scanner-wrapper { max-width: 620px; width: 100%; }

    /* Result panel shown below scanner */
    #scan-result-panel {
      display: none;
      margin-top: 1.25rem;
      animation: slideUp 0.4s ease;
    }

    /* Detail cards grid */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin: 1.1rem 0;
    }

    .detail-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      transition: transform 0.2s ease;
      animation: fadeIn 0.35s ease both;
    }

    .detail-card:hover { transform: translateY(-2px); }

    .detail-card-icon { font-size: 1.2rem; margin-bottom: 0.35rem; }
    .detail-card-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
    }
    .detail-card-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
      line-height: 1.3;
    }

    .detail-card.expiry-ok  { border-color: rgba(16,185,129,0.3); }
    .detail-card.expiry-ok  .detail-card-value { color: #34d399; }
    .detail-card.expiry-warn { border-color: rgba(239,68,68,0.35); }
    .detail-card.expiry-warn .detail-card-value { color: #f87171; }

    /* Status banner */
    .result-banner {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.85rem 1.25rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
    }
    .result-banner.genuine {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.35);
    }
    .result-banner.fake {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.35);
    }
    .result-banner-emoji { font-size: 2rem; }
    .result-banner-main  { font-size: 1rem; font-weight: 800; }
    .genuine .result-banner-main { color: #34d399; }
    .fake    .result-banner-main { color: #f87171; }
    .result-banner-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.1rem; }

    /* Hash box */
    .mini-hash {
      background: rgba(108,99,255,0.07);
      border: 1px solid rgba(108,99,255,0.2);
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      margin-bottom: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      word-break: break-all;
      line-height: 1.5;
    }
    .mini-hash-label {
      font-size: 0.65rem;
      color: #a78bfa;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.25rem;
    }

    /* Scan again button */
    .btn-scan-again {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #6c63ff, #4f46e5);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 16px rgba(108,99,255,0.4);
    }
    .btn-scan-again:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,99,255,0.5);
    }

    /* Scanning overlay on the hint */
    .verifying-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.6rem;
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo"><span class="logo-icon">💊</span> MedVerify</div>
    <div class="nav-links" id="nav-links"></div>
  </header>
  <main>
    <div class="scanner-wrapper" id="scanner-container">
      <div class="page-header" style="margin-bottom:1rem;">
        <div>
          <div class="page-title">QR <span>Scanner</span></div>
          <p style="color:var(--text-muted);font-size:0.85rem;margin-top:0.25rem;">Point your camera at the medicine QR / barcode</p>
        </div>
      </div>

      <!-- Scanner card -->
      <div class="glass-card scanner-body" id="scanner-card">
        <div id="reader"></div>
        <div class="scan-hint" id="scan-hint">
          <span class="scan-pulse"></span>
          Camera active — hold QR code steady to scan
        </div>
      </div>

      <!-- Result panel — shown inline after scan -->
      <div id="scan-result-panel">
        <div class="glass-card" style="padding:1.5rem; position:relative; overflow:hidden;">
          <div id="scan-result-inner"></div>
        </div>
      </div>
    </div>
  </main>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="js/app.js"></script>
  <script src="js/scanner.js"></script>
</body>
</html>
