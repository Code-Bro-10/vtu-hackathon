<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — MedVerify</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo"><span class="logo-icon">💊</span> MedVerify</div>
    <div class="nav-links" id="nav-links"></div>
  </header>
  <main>
    <div class="admin-grid" id="admin-container">

      <div class="page-header">
        <div>
          <div class="page-title">Admin <span>Panel</span></div>
          <p style="color:var(--text-muted);font-size:0.85rem;margin-top:0.25rem;">Manage medicine registry and monitor detections</p>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card primary">
          <div class="stat-icon">📊</div>
          <div class="stat-number" id="total-scans">—</div>
          <div class="stat-label">Total Scans</div>
        </div>
        <div class="stat-card success">
          <div class="stat-icon">✅</div>
          <div class="stat-number" id="genuine-scans">—</div>
          <div class="stat-label">Genuine Verified</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-icon">🚨</div>
          <div class="stat-number" id="fake-scans">—</div>
          <div class="stat-label">Fake Detected</div>
        </div>
      </div>

      <div class="glass-card">
        <h3 style="font-weight:700;margin-bottom:0.25rem;">➕ Add New Medicine</h3>
        <p style="color:var(--text-muted);font-size:0.82rem;margin-bottom:1.5rem;">A unique QR ID will be generated automatically.</p>
        <form id="add-medicine-form" class="add-med-form" novalidate>
          <div class="form-group">
            <label>Medicine Name</label>
            <div class="input-wrap">
              <input type="text" id="med-name" placeholder="e.g. Paracetamol 500mg" required>
              <span class="input-icon">💊</span>
            </div>
          </div>
          <div class="form-group">
            <label>Batch Number</label>
            <div class="input-wrap">
              <input type="text" id="med-batch" placeholder="e.g. BATCH-2025-01" required>
              <span class="input-icon">#️⃣</span>
            </div>
          </div>
          <div class="form-group">
            <label>Manufacturer</label>
            <div class="input-wrap">
              <input type="text" id="med-mfg" placeholder="e.g. PharmaCorp Ltd." required>
              <span class="input-icon">🏭</span>
            </div>
          </div>
          <div class="form-group">
            <label>Expiry Date</label>
            <div class="input-wrap">
              <input type="date" id="med-exp" required>
              <span class="input-icon">📅</span>
            </div>
          </div>
          <div class="btn-row">
            <button type="submit" class="btn btn-primary" id="add-btn">
              <span class="btn-text">Add Medicine & Generate QR ID</span>
            </button>
          </div>
        </form>
      </div>

      <div class="table-wrapper">
        <div class="table-header">
          <span class="table-title">Medicine Registry</span>
          <span style="font-size:0.8rem;color:var(--text-muted)" id="med-count"></span>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Batch</th>
                <th>Manufacturer</th>
                <th>Expiry</th>
                <th>QR ID</th>
              </tr>
            </thead>
            <tbody id="medicines-body">
              <tr><td colspan="5"><div class="empty-state"><div class="empty-icon">⏳</div><p>Loading registry...</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
