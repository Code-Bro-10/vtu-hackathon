<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Medicine Analyzer — MedVerify</title>
  <meta name="description" content="Upload a medicine image and get AI-powered analysis including expiry date, usage, age limits, and drug warnings.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── AI Analyzer Page Styles ── */
    .analyzer-wrapper {
      width: 100%;
      max-width: 780px;
      margin: 2rem auto;
      animation: slideUp 0.4s ease;
    }

    .upload-zone {
      border: 2px dashed rgba(108, 99, 255, 0.4);
      border-radius: 20px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      background: rgba(108, 99, 255, 0.03);
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--primary);
      background: rgba(108, 99, 255, 0.08);
      box-shadow: 0 0 40px rgba(108, 99, 255, 0.15);
    }

    .upload-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .upload-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .upload-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .upload-or {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin: 0.75rem 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #file-input { display: none; }

    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: linear-gradient(135deg, #6c63ff, #4f46e5);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.4);
    }

    .btn-upload:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(108, 99, 255, 0.5);
    }

    /* Image preview */
    .preview-section {
      display: none;
      margin-top: 1.5rem;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .preview-header span {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }

    .btn-remove:hover { background: rgba(239, 68, 68, 0.12); }

    #image-preview {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      display: block;
      padding: 1rem;
    }

    /* Result display */
    #ai-result {
      margin-top: 1.5rem;
    }

    .ai-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 2.5rem;
      color: var(--text-muted);
    }

    .ai-loading .dots span {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--primary);
      margin: 0 3px;
      animation: dotBounce 1.4s infinite both;
    }

    .ai-loading .dots span:nth-child(2) { animation-delay: 0.2s; }
    .ai-loading .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    .ai-card {
      background: var(--glass);
      border: 1px solid rgba(108, 99, 255, 0.25);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      animation: slideUp 0.4s ease;
    }

    .ai-card-header {
      background: linear-gradient(135deg, rgba(108, 99, 255, 0.18), rgba(79, 70, 229, 0.12));
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid rgba(108, 99, 255, 0.2);
    }

    .ai-card-header h3 {
      font-size: 1rem;
      font-weight: 700;
      color: #a78bfa;
      margin: 0;
    }

    .ai-badge {
      margin-left: auto;
      background: rgba(108, 99, 255, 0.2);
      border: 1px solid rgba(108, 99, 255, 0.4);
      color: #a78bfa;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ai-sections {
      padding: 1.5rem;
      display: grid;
      gap: 1rem;
    }

    .ai-section {
      border-radius: 12px;
      padding: 1rem 1.25rem;
      border: 1px solid;
      transition: transform 0.2s ease;
    }

    .ai-section:hover { transform: translateX(4px); }

    .ai-section.expiry   { background: rgba(16, 185, 129, 0.07); border-color: rgba(16, 185, 129, 0.25); }
    .ai-section.usage    { background: rgba(108, 99, 255, 0.07); border-color: rgba(108, 99, 255, 0.25); }
    .ai-section.age      { background: rgba(245, 158, 11, 0.07); border-color: rgba(245, 158, 11, 0.25); }
    .ai-section.warnings { background: rgba(239, 68, 68, 0.07);  border-color: rgba(239, 68, 68, 0.25);  }
    .ai-section.general  { background: rgba(255, 255, 255, 0.03); border-color: var(--border); }

    .ai-section-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .ai-section.expiry   .ai-section-label { color: #34d399; }
    .ai-section.usage    .ai-section-label { color: #a78bfa; }
    .ai-section.age      .ai-section-label { color: #fbbf24; }
    .ai-section.warnings .ai-section-label { color: #f87171; }
    .ai-section.general  .ai-section-label { color: var(--text-muted); }

    .ai-section-content {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .ai-section-content strong { color: var(--text); }

    .ai-section-content ul {
      padding-left: 1.2rem;
      margin-top: 0.25rem;
    }

    .ai-section-content li { margin-bottom: 0.25rem; }

    /* analyze button */
    .btn-analyze {
      width: 100%;
      margin-top: 1.25rem;
      padding: 1rem;
      background: linear-gradient(135deg, #6c63ff, #4f46e5);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.4);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-analyze:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(108, 99, 255, 0.55);
    }

    .btn-analyze:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Error box */
    .ai-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      padding: 1.25rem;
      color: #f87171;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo"><span class="logo-icon">💊</span> MedVerify</div>
    <div class="nav-links" id="nav-links"></div>
  </header>
  <main>
    <div class="analyzer-wrapper" id="analyzer-container">
      <div class="page-header">
        <div>
          <div class="page-title">🤖 AI Medicine <span>Analyzer</span></div>
          <p style="color:var(--text-muted);font-size:0.85rem;margin-top:0.25rem;">
            Upload a medicine photo for instant AI-powered drug intelligence
          </p>
        </div>
      </div>

      <!-- Upload Zone -->
      <div class="glass-card" style="padding: 1.5rem;">
        <div class="upload-zone" id="upload-zone">
          <span class="upload-icon">📷</span>
          <div class="upload-title">Drop your medicine image here</div>
          <div class="upload-sub">Supports JPG, PNG, WEBP — Max 10MB</div>
          <div class="upload-or">— or —</div>
          <button class="btn-upload" onclick="document.getElementById('file-input').click()">
            📁 Browse Image
          </button>
          <input type="file" id="file-input" accept="image/*">
        </div>

        <!-- Preview -->
        <div class="preview-section" id="preview-section">
          <div class="preview-header">
            <span id="file-name">image.jpg</span>
            <button class="btn-remove" onclick="removeImage()">✕ Remove</button>
          </div>
          <img id="image-preview" src="" alt="Medicine preview">
        </div>

        <button class="btn-analyze" id="analyze-btn" disabled onclick="analyzeImage()">
          <span id="analyze-btn-text">🔬 Analyze Medicine</span>
        </button>
      </div>

      <!-- AI Result -->
      <div id="ai-result"></div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/analyzer.js"></script>
</body>
</html>
