<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — MedVerify</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo"><span class="logo-icon">💊</span> MedVerify</div>
  </header>
  <main>
    <div class="auth-wrapper">
      <div class="auth-header">
        <div class="badge">🚀 Get Started</div>
        <h2>Create Account</h2>
        <p>Join MedVerify and start verifying medicines instantly</p>
      </div>
      <div class="glass-card">
        <form id="signup-form" novalidate>
          <div class="form-group">
            <label for="name">Full Name</label>
            <div class="input-wrap">
              <input type="text" id="name" placeholder="John Doe" required>
              <span class="input-icon">👤</span>
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrap">
              <input type="email" id="email" placeholder="you@example.com" required>
              <span class="input-icon">✉️</span>
            </div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input type="password" id="password" placeholder="Min 6 characters" required>
              <span class="input-icon">🔒</span>
            </div>
          </div>
          <div class="form-group">
            <label for="role">Account Type</label>
            <div class="input-wrap">
              <select id="role">
                <option value="user">👤 User (Consumer)</option>
                <option value="admin">🛡️ Admin (Manufacturer)</option>
              </select>
              <span class="input-icon">🏷️</span>
            </div>
          </div>
          <span id="error-msg" class="error-msg"></span>
          <button type="submit" class="btn btn-primary" id="signup-btn">
            <span class="btn-text">Create Account →</span>
          </button>
        </form>
      </div>
      <div class="auth-footer">
        Already have an account? <a href="index.html">Sign in</a>
      </div>
    </div>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
